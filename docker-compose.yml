services:
  bot:
    build: .
    container_name: quadslab-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://quadslab:${POSTGRES_PASSWORD:-botpassword}@db:5432/quadslab_bot
      # Website integration settings
      - WEBSITE_URL=${WEBSITE_URL}
      - WEBSITE_WEBHOOK_SECRET=${WEBSITE_WEBHOOK_SECRET}
      # Ngrok settings (passed from .env)
      - NGROK_ENABLED=${NGROK_ENABLED:-false}
      - NGROK_AUTH_TOKEN=${NGROK_AUTH_TOKEN:-}
      - NGROK_REGION=${NGROK_REGION:-us}
      # Use DOCKER_WEBHOOK_PORT if set, otherwise fall back to WEBHOOK_SERVER_PORT
      - WEBHOOK_SERVER_PORT=${DOCKER_WEBHOOK_PORT:-${WEBHOOK_SERVER_PORT:-3001}}
    ports:
      # Expose webhook server (use DOCKER_WEBHOOK_PORT to avoid conflict with local dev)
      - "${DOCKER_WEBHOOK_PORT:-${WEBHOOK_SERVER_PORT:-3001}}:${DOCKER_WEBHOOK_PORT:-${WEBHOOK_SERVER_PORT:-3001}}"
    networks:
      - bot-network

  db:
    image: postgres:16
    container_name: quadslab-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=quadslab_bot
      - POSTGRES_USER=quadslab
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-botpassword}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Using 5433 externally to avoid conflict with local PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quadslab -d quadslab_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  pg-data:
